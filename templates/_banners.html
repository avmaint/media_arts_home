<div id="bannerContainer"></div>

<script>
(function() {
  const AVL_URL = window.location.protocol + "//" + window.location.hostname + ":8080";

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderMentions(html) {
    return html.replace(/@([A-Za-z0-9_-]+)/g, function(_, ref) {
      const url = /^KB\d+$/i.test(ref)
        ? AVL_URL + "?tab=knowledgeBase&issue=" + ref
        : AVL_URL + "?tab=assetDetails&tag=" + ref;
      return '<a href="' + url + '" target="_blank" rel="noopener noreferrer" class="mention-link">@' + ref + '</a>';
    });
  }

  function isActive(msg) {
    const now = new Date().toISOString().slice(0, 16);
    return msg.start <= now && now <= msg.end;
  }

  const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };

  function renderBanners(msgs) {
    const active = msgs
      .filter(isActive)
      .sort((a, b) => (PRIORITY_ORDER[a.priority] ?? 9) - (PRIORITY_ORDER[b.priority] ?? 9));

    const container = document.getElementById("bannerContainer");
    if (!container) return;

    container.innerHTML = active.map(function(m) {
      return '<div class="banner banner-' + m.priority + '">'
        + '<span class="banner-label">' + escHtml(m.priority.toUpperCase()) + '</span>'
        + '<span class="banner-text">' + renderMentions(escHtml(m.text)) + '</span>'
        + '</div>';
    }).join("");
  }

  function fetchAndRender() {
    fetch("/api/messages")
      .then(function(r) { return r.json(); })
      .then(renderBanners)
      .catch(function() {});
  }

  fetchAndRender();
  setInterval(fetchAndRender, 30000);
})();
</script>
